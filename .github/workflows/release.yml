name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential libicu-dev pkg-config curl

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download htmx
        run: make web/static/htmx.min.js

      - name: Download Go modules
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION=$(cat VERSION)
          GIT_BUILD=$(git rev-parse --short HEAD)
          go build \
            -ldflags="-X main.Version=${VERSION} -X main.Build=${GIT_BUILD}" \
            -o agenthub-linux-amd64 \
            ./src/cmd/agenthub/...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agenthub-linux-amd64
          generate_release_notes: true
